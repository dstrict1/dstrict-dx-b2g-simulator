<!DOCTYPE html>
<!--
  ================================================================
  d'strict B2G Simulator — AUTH PATCH 적용 가이드
  ================================================================
  원본 HTML 파일(dstrict_dx_b2g_simulator.html)에
  아래 3단계를 적용하면 로그인/회원가입/승인 시스템이 활성화됩니다.

  [STEP 1] CSS 한 줄 주석 처리
  [STEP 2] Boot 로직 로그인 우회 제거
  [STEP 3] </body> 직전 <script> 블록 삽입

  아래 이 파일을 원본 HTML과 함께 사용하거나,
  직접 원본에 병합하세요.
  ================================================================
-->

<!--
=== STEP 1: 원본 HTML CSS 블록에서 다음 줄을 찾아 주석 처리 ===

찾기 (minified CSS 한 줄):
  #screen-login.active{display:none!important}

변경:
  /* AUTH-PATCH: 아래 JS가 제어 */

=== STEP 2: 원본 HTML 스크립트 맨 아래 startApp() 내부 수정 ===

찾기:
  CURRENT_USER={id:'public',name:'',role:'admin'};
  IS_READONLY=false;
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('app').classList.add('active');
  buildLeft();buildRight();bindActionBar();
  autoSetScenarios();
  BASELINE=null;
  document.getElementById('confirm-time').textContent='';
  switchPage('simulator');

변경:
  // AUTH-PATCH: 로그인 우회 제거됨 — auth_patch_script가 처리

=== STEP 3: </body> 바로 위에 아래 <script> 블록 전체를 붙여넣기 ===
-->

<script>
/* ================================================================
   d'strict B2G Simulator — AUTH PATCH v1.0
   © d'strict — 로그인/회원가입/관리자 승인 시스템

   삽입 위치: 원본 HTML </body> 태그 직전
   의존성: 원본 HTML의 전역 변수 (CURRENT_USER, IS_READONLY, enterApp 등)
================================================================ */

/* ── 0. CSS 패치 인젝션 ── */
(function() {
  const s = document.createElement('style');
  s.textContent = `
    /* ── 로그인 화면 강제 활성화 ── */
    #screen-login.active { display: flex !important; }
    #screen-login { display: none; flex-direction: column; }

    /* ── 로그인 카드 탭 ── */
    .login-tab-row {
      display: flex; margin-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }
    .login-tab {
      flex: 1; padding: 9px 0; font-size: 13px; font-weight: 600;
      border: none; background: none; cursor: pointer;
      color: var(--hint); border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: color .15s, border-color .15s;
      font-family: var(--font); letter-spacing: 0.2px;
    }
    .login-tab.on { color: var(--purple); border-bottom-color: var(--purple); }

    /* ── 비밀번호 눈 아이콘 ── */
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 36px !important; }
    .pw-eye {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--hint);
      padding: 2px; line-height: 1; font-size: 15px;
    }
    .pw-eye:hover { color: var(--text); }

    /* ── 관리자 회원관리 페이지 ── */
    #page-admin {
      display: none; flex: 1; overflow-y: auto;
      padding: 20px 24px; background: var(--bg);
    }
    .admin-user-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 13px 15px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 12px;
      transition: border-color .15s;
    }
    .admin-user-card:hover { border-color: var(--purple); }

    /* ── 역할/상태 뱃지 ── */
    .r-badge, .s-badge {
      display: inline-block; padding: 2px 8px; border-radius: 5px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
    }
    .r-badge.admin   { background: var(--purple-bg); color: var(--purple); }
    .r-badge.user    { background: var(--blue-bg);   color: var(--blue);   }
    .s-badge.active  { background: var(--green-bg);  color: var(--green);  }
    .s-badge.pending { background: var(--amber-bg);  color: var(--amber);  }
    .s-badge.denied  { background: var(--red-bg);    color: var(--red);    }

    /* ── 승인 대기 뱃지 ── */
    #auth-pending-badge {
      display: none;
      background: var(--red); color: #fff;
      border-radius: 50%; min-width: 16px; height: 16px; padding: 0 3px;
      font-size: 10px; font-weight: 700;
      align-items: center; justify-content: center;
      margin-left: 4px; flex-shrink: 0;
      vertical-align: middle;
    }
    #auth-pending-badge.show { display: inline-flex; }
  `;
  document.head.appendChild(s);
})();

/* ── 1. 사용자 DB ── */
const _AUTH_KEY = 'b2g_auth_users_v1';

function _getUsers() {
  try { return JSON.parse(localStorage.getItem(_AUTH_KEY) || '[]'); }
  catch { return []; }
}
function _saveUsers(arr) {
  localStorage.setItem(_AUTH_KEY, JSON.stringify(arr));
}

/** 기본 관리자 계정 최초 1회 생성 */
function initDefaultAdmin() {
  const users = _getUsers();
  if (!users.find(u => u.id === 'admin')) {
    users.unshift({
      id: 'admin', pw: _hash('dstrict2026!'),
      name: '관리자', role: 'admin', status: 'active',
      email: 'admin@dstrict.com',
      createdAt: new Date().toISOString(),
      approvedAt: new Date().toISOString(),
    });
    _saveUsers(users);
  }
}

function _hash(pw) {
  // 단순 해시 (서버 없는 환경용 — 실운영 시 서버사이드 필수)
  let h = 5381;
  for (let i = 0; i < pw.length; i++) h = (h * 33) ^ pw.charCodeAt(i);
  return (h >>> 0).toString(16).padStart(8, '0');
}

/* ── 2. 세션 관리 ── */
function _getSession() {
  try { return JSON.parse(sessionStorage.getItem('b2g_auth_session') || 'null'); }
  catch { return null; }
}
function _setSession(user) {
  const s = { id: user.id, name: user.name, role: user.role, at: Date.now() };
  sessionStorage.setItem('b2g_auth_session', JSON.stringify(s));
}
function _clearSession() {
  sessionStorage.removeItem('b2g_auth_session');
}

/* ── 3. 로그인 화면 렌더링 ── */
function _renderLogin() {
  const card = document.querySelector('#screen-login .login-card');
  if (!card) return;
  card.innerHTML = `
    <div class="login-logo">
      <div class="login-logo-mark">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#534AB7"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
          <polyline points="16 7 22 7 22 13"/>
        </svg>
      </div>
      <div class="login-title">B2G 전략 예산 시뮬레이터</div>
      <div class="login-sub">2026년 노임단가 · 2025 개정 가이드 기준</div>
    </div>

    <div class="login-tab-row">
      <button class="login-tab on" id="auth-tab-login"
        onclick="_switchLoginTab('login')">로그인</button>
      <button class="login-tab" id="auth-tab-signup"
        onclick="_switchLoginTab('signup')">회원가입</button>
    </div>

    <!-- 로그인 폼 -->
    <div id="auth-form-login">
      <div class="login-field">
        <label>아이디</label>
        <input id="auth-inp-id" type="text" class="login-input" placeholder="아이디 입력"
          autocomplete="username"
          onkeydown="if(event.key==='Enter')document.getElementById('auth-inp-pw').focus()">
      </div>
      <div class="login-field">
        <label>비밀번호</label>
        <div class="pw-wrap">
          <input id="auth-inp-pw" type="password" class="login-input"
            placeholder="비밀번호 입력" autocomplete="current-password"
            onkeydown="if(event.key==='Enter')_doLogin()">
          <button class="pw-eye" type="button" title="비밀번호 표시/숨김"
            onclick="const i=document.getElementById('auth-inp-pw');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁':'🙈'">👁</button>
        </div>
      </div>
      <div id="auth-login-err" class="login-error"></div>
      <button class="login-btn" onclick="_doLogin()">로그인</button>
      <div style="margin-top:12px;padding:10px 12px;background:var(--bg);border-radius:7px;
        font-size:11px;color:var(--hint);text-align:center;line-height:1.7">
        최초 관리자 계정<br>
        ID: <code style="background:rgba(0,0,0,.07);padding:1px 5px;border-radius:3px">admin</code>
        &nbsp;/&nbsp;
        PW: <code style="background:rgba(0,0,0,.07);padding:1px 5px;border-radius:3px">dstrict2026!</code>
        <br>
        <span style="color:var(--red);font-weight:600">로그인 후 비밀번호를 변경하세요.</span>
      </div>
    </div>

    <!-- 회원가입 폼 -->
    <div id="auth-form-signup" style="display:none">
      <div class="login-field">
        <label>아이디 <span style="color:var(--red)">*</span></label>
        <input id="su-id" type="text" class="login-input" placeholder="영문·숫자·_ 4~20자"
          autocomplete="off" oninput="_checkIdDup()">
        <div id="su-id-msg" style="font-size:11px;margin-top:4px;min-height:16px"></div>
      </div>
      <div class="login-field">
        <label>이름 <span style="color:var(--red)">*</span></label>
        <input id="su-name" type="text" class="login-input" placeholder="실명 입력" autocomplete="off">
      </div>
      <div class="login-field">
        <label>이메일 <span style="color:var(--hint);font-weight:400">(선택)</span></label>
        <input id="su-email" type="email" class="login-input" placeholder="example@dstrict.com" autocomplete="off">
      </div>
      <div class="login-field">
        <label>비밀번호 <span style="color:var(--red)">*</span></label>
        <div class="pw-wrap">
          <input id="su-pw" type="password" class="login-input" placeholder="8자 이상"
            autocomplete="new-password" oninput="_checkPWStr()">
          <button class="pw-eye" type="button"
            onclick="const i=document.getElementById('su-pw');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁':'🙈'">👁</button>
        </div>
        <div id="su-pw-str" style="font-size:11px;margin-top:4px;min-height:16px"></div>
      </div>
      <div class="login-field">
        <label>비밀번호 확인 <span style="color:var(--red)">*</span></label>
        <div class="pw-wrap">
          <input id="su-pw2" type="password" class="login-input" placeholder="비밀번호 재입력"
            autocomplete="new-password" onkeydown="if(event.key==='Enter')_doSignup()">
        </div>
      </div>
      <div id="auth-signup-err" class="login-error"></div>
      <button class="login-btn" onclick="_doSignup()"
        style="background:var(--teal,#0F6E56)">가입 신청</button>
      <div style="margin-top:10px;padding:10px 12px;background:var(--amber-bg);
        border-radius:7px;font-size:11px;color:var(--amber);line-height:1.7">
        ⚠️ 가입 신청 후 <strong>관리자 승인</strong>이 완료되어야 로그인 가능합니다.
      </div>
    </div>`;
}

/* 탭 전환 */
window._switchLoginTab = function(tab) {
  ['login','signup'].forEach(t => {
    document.getElementById('auth-tab-'+t)?.classList.toggle('on', t===tab);
    const f = document.getElementById('auth-form-'+t);
    if (f) f.style.display = t===tab ? 'block' : 'none';
  });
  document.getElementById('auth-login-err')?.classList.remove('show');
  document.getElementById('auth-signup-err')?.classList.remove('show');
};

/* 아이디 중복 체크 */
window._checkIdDup = function() {
  const v = (document.getElementById('su-id')?.value||'').trim();
  const m = document.getElementById('su-id-msg');
  if (!m) return;
  if (!v) { m.textContent=''; return; }
  if (!/^[a-zA-Z0-9_]{4,20}$/.test(v)) {
    m.style.color='var(--red)'; m.textContent='영문·숫자·_ 4~20자만 가능합니다.'; return;
  }
  if (_getUsers().find(u=>u.id===v)) {
    m.style.color='var(--red)'; m.textContent='이미 사용 중인 아이디입니다.';
  } else {
    m.style.color='var(--green)'; m.textContent='사용 가능한 아이디입니다.';
  }
};

/* 비밀번호 강도 */
window._checkPWStr = function() {
  const pw = document.getElementById('su-pw')?.value||'';
  const m  = document.getElementById('su-pw-str');
  if (!m) return;
  if (!pw) { m.textContent=''; return; }
  const strong = pw.length>=10 && /[A-Z]/.test(pw) && /\d/.test(pw) && /[^A-Za-z0-9]/.test(pw);
  const medium = pw.length>=8;
  if (strong)      { m.style.color='var(--green)'; m.textContent='강함 ✓'; }
  else if (medium) { m.style.color='var(--amber)'; m.textContent='보통 — 숫자+특수문자 추가 권장'; }
  else             { m.style.color='var(--red)';   m.textContent='8자 이상 필요'; }
};

/* ── 4. 로그인 처리 ── */
window._doLogin = function() {
  const uid = (document.getElementById('auth-inp-id')?.value||'').trim();
  const pw  = document.getElementById('auth-inp-pw')?.value||'';
  const err = document.getElementById('auth-login-err');
  const show = msg => { if(err){err.textContent=msg;err.classList.add('show');} };
  err?.classList.remove('show');

  if (!uid||!pw) { show('아이디와 비밀번호를 입력하세요.'); return; }

  const user = _getUsers().find(u=>u.id===uid);
  if (!user || user.pw !== _hash(pw)) {
    show('아이디 또는 비밀번호가 올바르지 않습니다.'); return;
  }
  if (user.status==='pending') { show('승인 대기 중입니다. 관리자 승인 후 로그인 가능합니다.'); return; }
  if (user.status==='denied')  { show('가입이 거절되었습니다. 관리자에게 문의하세요.'); return; }
  if (user.status!=='active')  { show('비활성화된 계정입니다.'); return; }

  // 마지막 로그인 시각 기록
  const users = _getUsers();
  const u2 = users.find(x=>x.id===uid);
  if (u2) { u2.lastLoginAt=new Date().toISOString(); _saveUsers(users); }

  _setSession(user);
  CURRENT_USER = { id:user.id, name:user.name, role:user.role };
  IS_READONLY  = false;
  document.body.classList.remove('readonly');
  document.getElementById('screen-login').classList.remove('active');

  // 원본 enterApp() 호출
  if (typeof enterApp === 'function') enterApp();
  else {
    document.getElementById('app').classList.add('active');
    if (typeof buildLeft==='function') buildLeft();
    if (typeof bindActionBar==='function') bindActionBar();
    if (typeof switchPage==='function') switchPage('simulator');
  }
  _updateTopbar();
  _updateAdminNav();
  _updatePendingBadge();
};

/* ── 5. 회원가입 처리 ── */
window._doSignup = function() {
  const id    = (document.getElementById('su-id')?.value||'').trim();
  const name  = (document.getElementById('su-name')?.value||'').trim();
  const email = (document.getElementById('su-email')?.value||'').trim();
  const pw    = document.getElementById('su-pw')?.value||'';
  const pw2   = document.getElementById('su-pw2')?.value||'';
  const err   = document.getElementById('auth-signup-err');
  const show  = msg => { if(err){err.textContent=msg;err.classList.add('show');} };
  err?.classList.remove('show');

  if (!id||!name||!pw||!pw2) { show('필수 항목을 모두 입력하세요.'); return; }
  if (!/^[a-zA-Z0-9_]{4,20}$/.test(id)) { show('아이디: 영문·숫자·_ 4~20자만 가능합니다.'); return; }
  if (_getUsers().find(u=>u.id===id)) { show('이미 사용 중인 아이디입니다.'); return; }
  if (pw.length<8) { show('비밀번호는 8자 이상이어야 합니다.'); return; }
  if (pw!==pw2)    { show('비밀번호가 일치하지 않습니다.'); return; }

  const users = _getUsers();
  users.push({
    id, pw:_hash(pw), name, email,
    role:'user', status:'pending',
    createdAt:new Date().toISOString(), approvedAt:null,
  });
  _saveUsers(users);

  // 완료 화면
  const card = document.querySelector('#screen-login .login-card');
  if (card) card.innerHTML = `
    <div style="text-align:center;padding:24px 0">
      <div style="font-size:52px;margin-bottom:14px">✅</div>
      <div style="font-size:17px;font-weight:700;color:var(--text);margin-bottom:8px;letter-spacing:-0.3px">
        가입 신청 완료
      </div>
      <div style="font-size:12px;color:var(--muted);line-height:1.9;margin-bottom:24px">
        <strong style="color:var(--text)">${name}</strong>님의 가입 신청이 접수되었습니다.<br>
        관리자 승인 후 로그인이 가능합니다.<br>
        <span style="color:var(--hint)">승인 여부는 관리자에게 문의하세요.</span>
      </div>
      <button onclick="_renderLogin()" style="
        padding:10px 28px;font-size:13px;font-weight:700;
        background:var(--purple);color:#fff;border:none;border-radius:8px;
        cursor:pointer;font-family:var(--font)">로그인 화면으로 →</button>
    </div>`;
};

/* ── 6. 로그아웃 ── */
window.authLogout = function() {
  if (!confirm('로그아웃 하시겠습니까?')) return;
  _clearSession();
  CURRENT_USER = null;
  IS_READONLY  = false;
  document.body.classList.remove('readonly');
  document.getElementById('app').classList.remove('active');
  const ls = document.getElementById('screen-login');
  ls.classList.add('active');
  _renderLogin();
};

/* ── 7. 탑바 사용자 표시 ── */
function _updateTopbar() {
  document.getElementById('auth-topbar-area')?.remove();
  const sep = document.querySelector('#topbar .tb-sep');
  if (!sep||!CURRENT_USER) return;

  const area = document.createElement('div');
  area.id = 'auth-topbar-area';
  area.style.cssText = 'display:flex;align-items:center;gap:8px;margin-left:6px;flex-shrink:0';
  const roleTxt = CURRENT_USER.role==='admin' ? '관리자' : '일반';
  area.innerHTML = `
    <span style="font-size:11px;color:rgba(255,255,255,.5);letter-spacing:0.2px">
      ${CURRENT_USER.name}
      <span style="color:rgba(255,255,255,.28)">(${roleTxt})</span>
    </span>
    <button onclick="authLogout()" class="tb-btn" style="font-size:10px;padding:4px 10px">
      로그아웃
    </button>`;
  sep.parentNode.insertBefore(area, sep.nextSibling);
}

/* ── 8. 관리자 네비 버튼 ── */
function _updateAdminNav() {
  document.getElementById('tb-btn-admin')?.remove();
  if (!CURRENT_USER || CURRENT_USER.role!=='admin') return;

  const nav = document.getElementById('tb-nav');
  if (!nav) return;
  const btn = document.createElement('button');
  btn.id = 'tb-btn-admin';
  btn.className = 'tb-nav-btn';
  btn.dataset.page = 'admin';
  btn.onclick = () => switchPage('admin');
  btn.innerHTML = `
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>
    회원 관리
    <span id="auth-pending-badge"></span>`;
  nav.appendChild(btn);
}

function _updatePendingBadge() {
  const badge = document.getElementById('auth-pending-badge');
  if (!badge) return;
  const cnt = _getUsers().filter(u=>u.status==='pending').length;
  badge.textContent = cnt;
  badge.classList.toggle('show', cnt>0);
}

/* ── 9. 관리자 회원 관리 페이지 ── */
function _renderAdminPage() {
  let page = document.getElementById('page-admin');
  if (!page) {
    page = document.createElement('div');
    page.id = 'page-admin';
    document.getElementById('app').appendChild(page);
  }

  const users   = _getUsers();
  const pending = users.filter(u=>u.status==='pending');
  const active  = users.filter(u=>u.status==='active');
  const denied  = users.filter(u=>u.status==='denied');

  const mkCard = u => {
    const isMe = CURRENT_USER?.id===u.id;
    const rl   = {admin:'관리자',user:'일반'}[u.role]||u.role;
    const sl   = {active:'승인됨',pending:'대기',denied:'거절'}[u.status]||u.status;
    const createdStr = u.createdAt ? new Date(u.createdAt).toLocaleDateString('ko-KR') : '-';
    const lastStr    = u.lastLoginAt ? new Date(u.lastLoginAt).toLocaleDateString('ko-KR') : '없음';
    return `
      <div class="admin-user-card">
        <div style="width:38px;height:38px;border-radius:50%;background:var(--purple-bg);
          display:flex;align-items:center;justify-content:center;flex-shrink:0;
          font-size:15px;font-weight:700;color:var(--purple)">
          ${(u.name||u.id).charAt(0).toUpperCase()}
        </div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-wrap:wrap">
            <span style="font-size:13px;font-weight:700;color:var(--text)">${u.name||u.id}</span>
            ${isMe?'<span style="font-size:10px;color:var(--purple);font-weight:600">(나)</span>':''}
            <span class="r-badge ${u.role}">${rl}</span>
            <span class="s-badge ${u.status}">${sl}</span>
          </div>
          <div style="font-size:11px;color:var(--hint)">
            ID: <strong style="color:var(--muted)">${u.id}</strong>
            ${u.email ? ` · ${u.email}` : ''}
            · 가입: ${createdStr}
            · 최근 로그인: ${lastStr}
          </div>
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
          ${u.status==='pending'?`
            <button onclick="_adminApprove('${u.id}')" style="padding:5px 12px;font-size:11px;
              font-weight:700;border:1px solid var(--green);border-radius:6px;
              background:var(--green-bg);color:var(--green);cursor:pointer;font-family:var(--font)">
              승인</button>
            <button onclick="_adminDeny('${u.id}')" style="padding:5px 12px;font-size:11px;
              font-weight:700;border:1px solid var(--red);border-radius:6px;
              background:var(--red-bg);color:var(--red);cursor:pointer;font-family:var(--font)">
              거절</button>`:''}
          ${u.status==='denied'?`
            <button onclick="_adminApprove('${u.id}')" style="padding:5px 12px;font-size:11px;
              font-weight:600;border:1px solid var(--green);border-radius:6px;
              background:var(--green-bg);color:var(--green);cursor:pointer;font-family:var(--font)">
              승인으로 변경</button>`:''}
          ${u.status==='active'&&!isMe&&u.role!=='admin'?`
            <button onclick="_adminSetAdmin('${u.id}')" style="padding:5px 10px;font-size:11px;
              font-weight:600;border:1px solid var(--purple);border-radius:6px;
              background:var(--purple-bg);color:var(--purple);cursor:pointer;font-family:var(--font)">
              관리자 지정</button>
            <button onclick="_adminDeactivate('${u.id}')" style="padding:5px 10px;font-size:11px;
              font-weight:600;border:1px solid var(--border);border-radius:6px;
              background:var(--bg);color:var(--muted);cursor:pointer;font-family:var(--font)">
              비활성화</button>`:''}
          ${u.status==='active'&&!isMe&&u.role==='admin'?`
            <button onclick="_adminRevokeAdmin('${u.id}')" style="padding:5px 10px;font-size:11px;
              font-weight:600;border:1px solid var(--amber);border-radius:6px;
              background:var(--amber-bg);color:var(--amber);cursor:pointer;font-family:var(--font)">
              권한 해제</button>`:''}
          ${!isMe?`
            <button onclick="_adminDeleteUser('${u.id}')" title="계정 삭제"
              style="padding:5px 8px;font-size:12px;font-weight:600;border:1px solid var(--border);
              border-radius:6px;background:var(--bg);color:var(--hint);cursor:pointer;
              font-family:var(--font)">✕</button>`:''}
        </div>
      </div>`;
  };

  // 비밀번호 변경 섹션
  const pwChangeSection = `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;
      padding:16px 18px;margin-bottom:16px">
      <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px">
        🔑 내 비밀번호 변경
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
        <div style="flex:1;min-width:160px">
          <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);
            margin-bottom:5px">현재 비밀번호</label>
          <input id="chpw-cur" type="password" class="inp"
            placeholder="현재 비밀번호" autocomplete="current-password">
        </div>
        <div style="flex:1;min-width:160px">
          <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);
            margin-bottom:5px">새 비밀번호 (8자 이상)</label>
          <input id="chpw-new" type="password" class="inp"
            placeholder="새 비밀번호" autocomplete="new-password">
        </div>
        <div style="flex:1;min-width:160px">
          <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);
            margin-bottom:5px">새 비밀번호 확인</label>
          <input id="chpw-new2" type="password" class="inp"
            placeholder="새 비밀번호 재입력" autocomplete="new-password">
        </div>
        <button onclick="_changeMyPW()"
          style="padding:9px 18px;font-size:12px;font-weight:700;border:none;
          border-radius:8px;background:var(--purple);color:#fff;cursor:pointer;
          font-family:var(--font);white-space:nowrap">변경</button>
      </div>
      <div id="chpw-msg" style="font-size:11px;margin-top:8px;min-height:16px"></div>
    </div>`;

  page.innerHTML = `
    <div style="max-width:960px;margin:0 auto">
      <div style="display:flex;align-items:center;justify-content:space-between;
        margin-bottom:18px;flex-wrap:wrap;gap:10px">
        <div>
          <h2 style="font-size:18px;font-weight:700;color:var(--text);
            letter-spacing:-0.3px;margin-bottom:3px">회원 관리</h2>
          <p style="font-size:12px;color:var(--muted)">
            가입 신청 승인 · 권한 설정 · 계정 관리</p>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${pending.length?`<div style="padding:7px 13px;background:var(--amber-bg);
            border:1px solid #f0d9a0;border-radius:8px;font-size:12px;
            color:var(--amber);font-weight:700">⏳ 대기 ${pending.length}명</div>`:''}
          <div style="padding:7px 13px;background:var(--green-bg);
            border:1px solid #c0dd97;border-radius:8px;font-size:12px;
            color:var(--green);font-weight:600">✅ 승인 ${active.length}명</div>
          <div style="padding:7px 13px;background:var(--bg);
            border:1px solid var(--border);border-radius:8px;font-size:12px;
            color:var(--muted);font-weight:600">👥 전체 ${users.length}명</div>
        </div>
      </div>

      ${pwChangeSection}

      ${pending.length?`
        <div style="background:var(--amber-bg);border:1px solid #f0d9a0;
          border-radius:12px;overflow:hidden;margin-bottom:14px">
          <div style="padding:11px 16px;font-size:11px;font-weight:700;
            color:var(--amber);letter-spacing:0.5px;text-transform:uppercase;
            border-bottom:1px solid #f0d9a0">⏳ 승인 대기 (${pending.length}명)</div>
          <div style="padding:8px 8px 8px">${pending.map(mkCard).join('')}</div>
        </div>`:''}

      <div style="background:var(--card);border:1px solid var(--border);
        border-radius:12px;overflow:hidden;margin-bottom:14px">
        <div style="padding:11px 16px;font-size:11px;font-weight:700;
          color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;
          border-bottom:1px solid var(--border)">✅ 승인된 회원 (${active.length}명)</div>
        <div style="padding:8px">
          ${active.map(mkCard).join('')||
            '<div style="padding:16px;text-align:center;font-size:12px;color:var(--hint)">없음</div>'}
        </div>
      </div>

      ${denied.length?`
        <div style="background:var(--bg);border:1px solid var(--border);
          border-radius:12px;overflow:hidden">
          <div style="padding:11px 16px;font-size:11px;font-weight:700;
            color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;
            border-bottom:1px solid var(--border)">❌ 거절/비활성 (${denied.length}명)</div>
          <div style="padding:8px">${denied.map(mkCard).join('')}</div>
        </div>`:''}
    </div>`;
}

/* ── 10. 관리자 액션 ── */
window._adminApprove = u => {
  const users=_getUsers(), x=users.find(a=>a.id===u); if(!x)return;
  x.status='active'; x.approvedAt=new Date().toISOString();
  _saveUsers(users);
  if(typeof showToast==='function') showToast(`✅ "${x.name}" 승인 완료`);
  _renderAdminPage(); _updatePendingBadge();
};
window._adminDeny = u => {
  if(!confirm('거절하시겠습니까?'))return;
  const users=_getUsers(), x=users.find(a=>a.id===u); if(!x)return;
  x.status='denied'; _saveUsers(users);
  if(typeof showToast==='function') showToast(`❌ "${x.name}" 거절됨`);
  _renderAdminPage(); _updatePendingBadge();
};
window._adminSetAdmin = u => {
  if(!confirm('관리자로 지정하시겠습니까?'))return;
  const users=_getUsers(), x=users.find(a=>a.id===u); if(!x)return;
  x.role='admin'; _saveUsers(users);
  if(typeof showToast==='function') showToast(`👑 "${x.name}" 관리자 지정`);
  _renderAdminPage();
};
window._adminRevokeAdmin = u => {
  if(!confirm('관리자 권한을 해제하시겠습니까?'))return;
  const users=_getUsers(), x=users.find(a=>a.id===u); if(!x)return;
  x.role='user'; _saveUsers(users);
  if(typeof showToast==='function') showToast(`"${x.name}" 일반 사용자로 변경`);
  _renderAdminPage();
};
window._adminDeactivate = u => {
  if(!confirm('비활성화하시겠습니까?'))return;
  const users=_getUsers(), x=users.find(a=>a.id===u); if(!x)return;
  x.status='denied'; _saveUsers(users);
  if(typeof showToast==='function') showToast(`"${x.name}" 비활성화됨`);
  _renderAdminPage();
};
window._adminDeleteUser = u => {
  const x=_getUsers().find(a=>a.id===u); if(!x)return;
  if(!confirm(`"${x.name}" 계정을 영구 삭제하시겠습니까?\n복구 불가합니다.`))return;
  _saveUsers(_getUsers().filter(a=>a.id!==u));
  if(typeof showToast==='function') showToast(`🗑️ "${x.name}" 삭제됨`);
  _renderAdminPage(); _updatePendingBadge();
};

/* ── 11. 내 비밀번호 변경 ── */
window._changeMyPW = function() {
  const cur  = document.getElementById('chpw-cur')?.value||'';
  const nw   = document.getElementById('chpw-new')?.value||'';
  const nw2  = document.getElementById('chpw-new2')?.value||'';
  const msg  = document.getElementById('chpw-msg');
  const show = (m,col) => { if(msg){msg.textContent=m;msg.style.color=col;} };

  if (!cur||!nw||!nw2) { show('모든 항목을 입력하세요.','var(--red)'); return; }
  const users = _getUsers();
  const u = users.find(x=>x.id===CURRENT_USER?.id);
  if (!u||u.pw!==_hash(cur)) { show('현재 비밀번호가 올바르지 않습니다.','var(--red)'); return; }
  if (nw.length<8) { show('새 비밀번호는 8자 이상이어야 합니다.','var(--red)'); return; }
  if (nw!==nw2) { show('새 비밀번호가 일치하지 않습니다.','var(--red)'); return; }
  u.pw = _hash(nw);
  _saveUsers(users);
  show('비밀번호가 변경되었습니다. ✓','var(--green)');
  ['chpw-cur','chpw-new','chpw-new2'].forEach(id => {
    const el=document.getElementById(id); if(el)el.value='';
  });
};

/* ── 12. switchPage 패치 — admin 페이지 연결 ── */
(function() {
  const origSwitch = window.switchPage;
  window.switchPage = function(page) {
    const adminPage = document.getElementById('page-admin');

    if (page === 'admin') {
      if (!CURRENT_USER || CURRENT_USER.role !== 'admin') return;
      // 다른 페이지 숨기기
      ['main','page-home','page-projects','page-guide'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
      ['action-bar','vat-banner','confirm-bar'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
      const ks = document.getElementById('kpi-sticky');
      if (ks) ks.style.display = 'none';
      if (adminPage) adminPage.style.display = 'block';
      document.querySelectorAll('.tb-nav-btn').forEach(b =>
        b.classList.toggle('on', b.dataset.page === 'admin'));
      _renderAdminPage();
      _updatePendingBadge();
      return;
    }

    if (adminPage) adminPage.style.display = 'none';
    if (typeof origSwitch === 'function') origSwitch(page);
  };
})();

/* ── 13. enterApp 패치 ── */
(function() {
  const origEnterApp = window.enterApp;
  window.enterApp = function() {
    if (typeof origEnterApp === 'function') origEnterApp();
    _updateTopbar();
    _updateAdminNav();
    _updatePendingBadge();
    if (CURRENT_USER) _setSession(CURRENT_USER);
  };
})();

/* ── 14. 부트 패치 — 원본 로그인 우회 차단 ── */
setTimeout(function _authBoot() {
  initDefaultAdmin();

  const session = _getSession();

  if (session) {
    // 세션 유효성 검증
    const user = _getUsers().find(u => u.id === session.id && u.status === 'active');
    if (user) {
      CURRENT_USER = { id:user.id, name:user.name, role:user.role };
      IS_READONLY  = false;
      // 앱이 이미 열려 있으면 UI만 갱신
      if (document.getElementById('app').classList.contains('active')) {
        _updateTopbar();
        _updateAdminNav();
        _updatePendingBadge();
        return;
      }
      // 앱 열기
      document.getElementById('screen-login').classList.remove('active');
      document.getElementById('app').classList.add('active');
      if (typeof buildLeft==='function') buildLeft();
      if (typeof bindActionBar==='function') bindActionBar();
      if (typeof switchPage==='function') switchPage('simulator');
      _updateTopbar();
      _updateAdminNav();
      _updatePendingBadge();
      return;
    }
    _clearSession();
  }

  // 세션 없음 — 원본이 앱을 이미 열어버렸으면 강제 닫기
  document.getElementById('app').classList.remove('active');
  document.body.classList.remove('readonly');
  // 원본이 설정한 sessionStorage 키 정리
  sessionStorage.removeItem('b2g5_s');

  // 로그인 화면 표시
  const ls = document.getElementById('screen-login');
  ls.classList.add('active');
  _renderLogin();

}, 80); // 원본 IIFE(즉시실행) 이후 실행 보장

/* 원본 doLogin 오버라이드 — 원본 로그인 버튼 이벤트 연결 */
window.doLogin = function() { _doLogin(); };

console.log("[AUTH PATCH v1.0] d'strict B2G 인증 모듈 초기화");
</script>
